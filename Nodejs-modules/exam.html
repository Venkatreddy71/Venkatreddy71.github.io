<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login & Signup</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background: linear-gradient(to right,#4e73df,#224abe);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.main-container{
    display:flex;
    gap:40px;
}

.card{
    width:380px;
    background:white;
    padding:35px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.card h2{
    text-align:center;
    margin-bottom:25px;
    font-weight:600;
}

.input-box{
    margin-bottom:15px;
    position:relative;
}

.input-box input{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:6px;
    font-size:14px;
}

.toggle-password{
    position:absolute;
    right:12px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:14px;
    color:#777;
}

.forgot{
    text-align:right;
    font-size:13px;
    margin-bottom:15px;
    color:#4e73df;
    cursor:pointer;
}

.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#1a73e8;
    color:white;
    font-size:15px;
    cursor:pointer;
    margin-bottom:15px;
}

.btn:hover{
    background:#155ab6;
}

.switch{
    text-align:center;
    font-size:14px;
    margin-bottom:15px;
}

.switch span{
    color:#4e73df;
    cursor:pointer;
}

.divider{
    display:flex;
    align-items:center;
    margin:15px 0;
}

.divider hr{
    flex:1;
    border:none;
    height:1px;
    background:#ddd;
}

.divider span{
    margin:0 10px;
    font-size:13px;
    color:#777;
}

.social-btn{
    width:100%;
    padding:10px;
    border-radius:6px;
    border:1px solid #ddd;
    margin-bottom:10px;
    cursor:pointer;
    font-size:14px;
}

.facebook{
    background:#3b5998;
    color:white;
    border:none;
}

.google{
    background:white;
}
</style>
</head>
<body>

<div class="main-container">

    <!-- LOGIN CARD -->
    <div class="card">
        <h2>Login</h2>

        <div class="input-box">
            <input type="email" placeholder="Email">
        </div>

        <div class="input-box">
            <input type="password" id="loginPass" placeholder="Password">
            <span class="toggle-password" onclick="togglePassword('loginPass')">👁</span>
        </div>

        <div class="forgot">Forgot password?</div>

        <button class="btn">Login</button>

        <div class="switch">
            Don't have an account? <span>Signup</span>
        </div>

        <div class="divider">
            <hr><span>Or</span><hr>
        </div>

        <button class="social-btn facebook" onclick="facebookLogin()">
            Login with Facebook
        </button>

        <button class="social-btn google" onclick="googleLogin()">
            Login with Google
        </button>
    </div>

    <!-- SIGNUP CARD -->
    <div class="card">
        <h2>Signup</h2>

        <div class="input-box">
            <input type="email" placeholder="Email">
        </div>

        <div class="input-box">
            <input type="password" id="signupPass" placeholder="Create password">
            <span class="toggle-password" onclick="togglePassword('signupPass')">👁</span>
        </div>

        <div class="input-box">
            <input type="password" id="confirmPass" placeholder="Confirm password">
            <span class="toggle-password" onclick="togglePassword('confirmPass')">👁</span>
        </div>

        <button class="btn">Signup</button>

        <div class="switch">
            Already have an account? <span>Login</span>
        </div>

        <div class="divider">
            <hr><span>Or</span><hr>
        </div>

        <button class="social-btn facebook" onclick="facebookLogin()">
            Login with Facebook
        </button>

        <button class="social-btn google" onclick="googleLogin()">
            Login with Google
        </button>
    </div>

</div>

<script>
function togglePassword(id){
    var input = document.getElementById(id);
    if(input.type === "password"){
        input.type = "text";
    } else {
        input.type = "password";
    }
}

function facebookLogin(){
    alert("Facebook login integration required (OAuth needed).");
}

function googleLogin(){
    alert("Google login integration required (OAuth needed).");
}
</script>

</body>
</html>
